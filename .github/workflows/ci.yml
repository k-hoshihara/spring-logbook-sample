name: CI

on:
    pull_request:
        branches: [ main ]

jobs:
    test:
        runs-on: ubuntu-latest

        steps:
            -   uses: actions/checkout@v6

            -   uses: actions/setup-java@v5
                with:
                    distribution: corretto
                    java-version: '25'

            -   uses: gradle/actions/setup-gradle@v5

            -   run: ./gradlew test
